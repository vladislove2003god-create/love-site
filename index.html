
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мы вместе ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff6a88, #ff99ac);
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* центр /
.container {
    text-align: center;
}

h1 {
    font-size: 38px;
    margin-bottom: 5px;
}

.name {
    font-size: 20px;
}

img {
    width: 260px;
    border-radius: 20px;
    margin: 15px 0;
}

/ ❤️ КРАСИВЫЙ БОЛЬШОЙ ТАЙМЕР /
.timer {
    position: fixed;
    bottom: 30px;
    display: flex;
    gap: 15px;
}

.box {
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 20px;
    text-align: center;
    min-width: 80px;
}

.num {
    font-size: 32px;
    font-weight: bold;
}

.label {
    font-size: 13px;
}

/ кнопка /
button {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: white;
    color: #ff4d6d;
}

/ попап /
.popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    color: #ff4d6d;
    padding: 20px;
    border-radius: 15px;
    font-size: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Мы вместе ❤️</h1>
    <div class="name">Влад ❤️ Диана</div>

    <img src="https://raw.githubusercontent.com/vladislove2003god-create/love-site/main/photo_2026-04-27_05-59-19.jpg">

    <button onclick="showLove()">Нажми ❤️</button>
</div>

<!-- ❤️ ТАЙМЕР ВНИЗУ -->
<div class="timer">
    <div class="box">
        <div class="num" id="days">0</div>
        <div class="label">дней ❤️</div>
    </div>
    <div class="box">
        <div class="num" id="hours">0</div>
        <div class="label">часов</div>
    </div>
    <div class="box">
        <div class="num" id="minutes">0</div>
        <div class="label">минут</div>
    </div>
</div>

<div class="popup" id="popup">Я тебя люблю ❤️</div>

<script>
// правильная дата
const startDate = new Date(2024, 9, 30);

function updateTimer() {
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000606024));
    const hours = Math.floor((diff / (10006060)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
}

updateTimer();
setInterval(updateTimer, 1000);

function showLove() {
    const p = document.getElementById("popup");
    p.style.display = "block";
    setTimeout(() => p.style.display = "none", 2000);
}
</script>

</body>
</h
