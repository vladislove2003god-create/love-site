<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мы вместе ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff6a88, #ff99ac);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

.container {
    text-align: center;
    color: white;
}

h1 {
    font-size: 40px;
}

.name {
    font-size: 22px;
}

img {
    width: 300px;
    border-radius: 15px;
    margin: 15px 0;
}

#timer {
    font-size: 20px;
}

/* КНОПКА /
button {
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
}

/ ПОПАП /
.popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    color: #ff4d6d;
    padding: 20px;
    border-radius: 15px;
    font-size: 22px;

    opacity: 0;
    transition: 0.5s;
}

.popup.show {
    display: block;
    opacity: 1;
}

/ СЕРДЕЧКИ /
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: fly 3s linear forwards;
}

@keyframes fly {
    to {
        transform: translateY(-100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Мы вместе ❤️</h1>
    <div class="name">Влад ❤️ Диана</div>

    <!-- ФОТО -->
    <img src="https://raw.githubusercontent.com/vladislove2003god-create/love-site/main/photo_2026-04-27_05-59-19.jpg">

    <div id="timer"></div>

    <button onclick="showLove(); playMusic()">Нажми ❤️</button>
</div>

<div class="popup" id="popup">Я тебя люблю ❤️</div>

<!-- МУЗЫКА -->
<audio id="music" src="music.mp3"></audio>

<script>
// ДАТА (исправлена для iPhone)
const startDate = new Date(2024, 9, 30);

function updateTimer() {
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000606024));
    const hours = Math.floor((diff / (10006060)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("timer").innerText =
        days + " дней " + hours + " часов " + minutes + " минут ❤️";
}

// запуск сразу
updateTimer();
setInterval(updateTimer, 1000);

// ПОПАП
function showLove() {
    const popup = document.getElementById("popup");
    popup.style.display = "block";

    setTimeout(() => {
        popup.classList.add("show");
    }, 10);

    setTimeout(() => {
        popup.classList.remove("show");
        setTimeout(() => popup.style.display = "none", 500);
    }, 2000);
}

// МУЗЫКА
function playMusic() {
    document.getElementById("music").play();
}

// СЕРДЕЧКИ
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "❤️";

    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
}

setInterval(createHeart, 400);
</script>

</body>
