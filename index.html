
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мы вместе ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff6a88, #ff99ac);
    font-family: -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* карточка /
.app {
    width: 320px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 20px;
    text-align: center;
    color: white;
}

/ фото /
img {
    width: 260px;
    border-radius: 20px;
    margin: 10px auto;
    display: block;
}

/ таймер /
.timer {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.flip-box {
    flex: 1;
    margin: 3px;
    text-align: center;
}

.flip {
    position: relative;
    height: 40px;
    overflow: hidden;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
}

.flip span {
    position: absolute;
    width: 100%;
    left: 0;
    font-size: 24px;
    font-weight: bold;
    transition: transform 0.4s ease;
}

/ анимация /
.flip.animate span {
    transform: translateY(-40px);
}

.label {
    font-size: 11px;
}

/ кнопка /
button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: none;
    background: white;
    color: #ff4d6d;
}

/ попап /
.popup {
    display: none;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: #ff4d6d;
    padding: 12px 20px;
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="app">
    <h2>Мы вместе ❤️</h2>
    <div>Влад ❤️ Диана</div>

    <img src="https://raw.githubusercontent.com/vladislove2003god-create/love-site/main/photo_2026-04-27_05-59-19.jpg">

    <div class="timer">
        <div class="flip-box">
            <div class="flip" id="days"><span>0</span></div>
            <div class="label">дней ❤️</div>
        </div>
        <div class="flip-box">
            <div class="flip" id="hours"><span>0</span></div>
            <div class="label">часов</div>
        </div>
        <div class="flip-box">
            <div class="flip" id="minutes"><span>0</span></div>
            <div class="label">минут</div>
        </div>
    </div>

    <button onclick="showLove()">Я тебя люблю ❤️</button>
</div>

<div class="popup" id="popup">❤️ И я тебя ❤️</div>

<script>
const startDate = new Date(2024, 9, 30);

function animateChange(id, newValue) {
    const el = document.getElementById(id);
    const span = el.querySelector("span");

    if (span.textContent == newValue) return;

    el.classList.add("animate");

    setTimeout(() => {
        span.textContent = newValue;
        el.classList.remove("animate");
    }, 200);
}

function updateTimer() {
    const now = new Date();
    const diff = now - startDate;

    const d = Math.floor(diff / (1000606024));
    const h = Math.floor((diff / (10006060)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);

    animateChange("days", d);
    animateChange("hours", h);
    animateChange("minutes", m);
}

updateTimer();
setInterval(updateTimer, 1000);

function showLove() {
    const popup = document.getElementById("popup");
    popup.style.display = "block";
    setTimeout(() => popup.style.display = "none", 2000);
}
</script>

</body>
</htm
