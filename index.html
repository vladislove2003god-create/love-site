<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мы вместе ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff6a88, #ff99ac);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

.container {
    text-align: center;
    color: white;
}

h1 {
    font-size: 40px;
}

.name {
    font-size: 22px;
}

img {
    width: 260px;
    border-radius: 20px;
    margin: 15px 0;
}

#timer {
    font-size: 20px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: white;
    color: #ff4d6d;
}

.popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    color: #ff4d6d;
    padding: 20px;
    border-radius: 15px;
    font-size: 22px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Мы вместе ❤️</h1>
    <div class="name">Влад ❤️ Диана</div>

    <!-- ВСТРОЕННОЕ ФОТО -->
   <img src="https://raw.githubusercontent.com/vladislove2003god-create/love-site/main/photo_2026-04-27_05-59-19.jpg" style="width:300px; border-radius:15px;">

    <div id="timer"></div>
    <button onclick="showLove()">Нажми ❤️</button>
</div>

<div class="popup" id="popup">Я тебя люблю ❤️</div>

<script>
const startDate = new Date("2024-10-30");

function updateTimer() {
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("timer").innerText =
        days + " дней " + hours + " часов " + minutes + " минут ❤️";
}

setInterval(updateTimer, 1000);

function showLove() {
    document.getElementById("popup").style.display = "block";
}
</script>

</body>
</html>
