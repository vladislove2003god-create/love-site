<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мы вместе ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff7eb3, #ff758c);
  color: white;
}

.container {
  margin-top: 50px;
}

h1 {
  font-size: 40px;
}

.name {
  font-size: 20px;
  margin-bottom: 20px;
}

img {
  width: 300px;
  border-radius: 15px;
  margin: 20px 0;
}

#timer {
  font-size: 22px;
  margin-top: 10px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
}

.popup {
  display: none;
  margin-top: 20px;
  font-size: 24px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Мы вместе ❤️</h1>
  <div class="name">Влад ❤️ Диана</div>

  <!-- ВОТ ТВОЁ ФОТО -->
  <img src="https://i.imgur.com/jxWYmh2.jpeg" alt="Мы">

  <div id="timer"></div>

  <button onclick="showLove()">Нажми ❤️</button>

  <div class="popup" id="popup">Я тебя люблю ❤️</div>
</div>

<script>
// дата начала (измени если нужно)
const startDate = new Date("2024-10-30 00:00:00");

function updateTimer() {
  const now = new Date();
  const diff = now - startDate;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);

  document.getElementById("timer").innerText =
    days + " дней " + hours + " часов " + minutes + " минут";
}

setInterval(updateTimer, 1000);

function showLove() {
  document.getElementById("popup").style.display = "block";
}
</script>

</body>
</html>
